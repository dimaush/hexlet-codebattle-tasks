level             = "easy"
name              = "alpine_slalom_best_run"
tags              = ["math", "winter_olympics"]
time_to_solve_sec = 230

description_en = """
Given run times `times_sec` for one alpine slalom athlete, return the best run time.
Non-positive values (`<= 0`) mean invalid run (`DNF`) and must be ignored.
If there are no valid runs, return `0`.
"""

description_ru = """
Дан массив времен `times_sec` одного спортсмена в слаломе.
Верните лучшее время.
Неположительные значения (`<= 0`) означают невалидный заезд (`DNF`) и должны игнорироваться.
Если валидных заездов нет, верните `0`.
"""

solution = """
def solution(times_sec: list[int]) -> int:
    t = [x for x in times_sec if x > 0]
    return min(t) if t else 0
"""

examples = """
solution([]) == 0
solution([61]) == 61
solution([0, 64, 62, 63]) == 62
"""

[[input_signature]]
argument_name = "times_sec"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "integer"

[output_signature.type]
name = "integer"

