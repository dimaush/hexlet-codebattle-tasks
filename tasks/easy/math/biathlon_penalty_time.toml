level             = "easy"
name              = "biathlon_penalty_time"
tags              = ["math", "winter_olympics"]
time_to_solve_sec = 220

description_en = """
In biathlon, each miss adds a fixed penalty.
Given `base_time_sec`, `misses`, and `penalty_per_miss_sec`, return final time.
If `misses == 0`, apply a clean-shooting bonus: subtract `10` seconds, but final time cannot go below `0`.
"""

description_ru = """
В биатлоне каждый промах добавляет фиксированный штраф.
Даны `base_time_sec`, `misses`, `penalty_per_miss_sec`.
Верните итоговое время.
Если `misses == 0`, применяется бонус за чистую стрельбу: вычтите `10` секунд, но итог не может быть меньше `0`.
"""

solution = """
def solution(base_time_sec: int, misses: int, penalty_per_miss_sec: int) -> int:
    t = base_time_sec + misses * penalty_per_miss_sec - (10 if misses == 0 else 0)
    return max(0, t)
"""

examples = """
solution(0, 0, 30) == 0
solution(1200, 1, 30) == 1230
solution(1300, 0, 45) == 1290
"""

