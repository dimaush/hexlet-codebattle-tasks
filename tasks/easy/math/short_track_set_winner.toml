level             = "easy"
name              = "short_track_set_winner"
tags              = ["math", "winter_olympics"]
time_to_solve_sec = 235

description_en = """
Given race points `a` and `b` in a short-track duel, return:
- `"A"` if A already won
- `"B"` if B already won
- `"InProgress"` otherwise

A side wins at `15` points with at least `2` points lead.
"""

description_ru = """
Даны очки `a` и `b` в дуэли шорт-трека. Верните:
- `"A"`, если A уже выиграл
- `"B"`, если B уже выиграл
- `"InProgress"` иначе

Победа фиксируется от `15` очков при разнице минимум `2`.
"""

solution = """
def solution(a: int, b: int) -> str:
    if max(a, b) < 15 or abs(a - b) < 2:
        return "InProgress"
    return "A" if a > b else "B"
"""

examples = """
solution(15, 13) == "A"
solution(14, 14) == "InProgress"
solution(18, 20) == "B"
"""

