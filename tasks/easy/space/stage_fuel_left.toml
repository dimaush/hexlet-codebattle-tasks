level             = "easy"
name              = "stage_fuel_left"
tags              = ["space", "math"]
time_to_solve_sec = 220

description_en = """
Selene reaches parking orbit and performs several planned burns. Given the starting fuel, the burn costs, and the mandatory reserve, return the remaining fuel or `-1` if the reserve would be violated.
"""

description_ru = """
Selene выходит на опорную орбиту и выполняет несколько плановых импульсов. По начальному запасу топлива, расходам на импульсы и обязательному резерву верните остаток топлива или `-1`, если резерв будет нарушен.
"""

limits = """
- $0 \\leq \\text{fuel}, \\text{reserve} \\leq 10^6$
- $0 \\leq \\text{len}(\\text{burns}) \\leq 100$
- $0 \\leq \\text{burns}[i] \\leq 10^5$
"""

solution = """
def solution(fuel: int, burns: list[int], reserve: int) -> int:
    left = fuel - sum(burns)
    return left if left >= reserve else -1
"""

examples = """
solution(50, [], 10) == 50
solution(50, [50], 1) == -1
solution(100, [10, 20], 30) == 70
"""

[[input_signature]]
argument_name = "fuel"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "burns"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "integer"

[[input_signature]]
argument_name = "reserve"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "integer"

[[asserts]]
arguments = [100, [10, 20], 30]
expected  = 70

[[asserts]]
arguments = [100, [10, 20], 80]
expected  = -1

[[asserts]]
arguments = [50, [], 10]
expected  = 50

[[asserts]]
arguments = [50, [50], 0]
expected  = 0

[[asserts]]
arguments = [50, [50], 1]
expected  = -1

[[asserts]]
arguments = [120, [10, 10, 10], 80]
expected  = 90

[[asserts]]
arguments = [120, [10, 10, 10], 91]
expected  = -1

[[asserts]]
arguments = [200, [30, 40, 50], 70]
expected  = 80

[[asserts]]
arguments = [200, [30, 40, 50], 81]
expected  = -1

[[asserts]]
arguments = [75, [5, 5, 5, 5], 55]
expected  = 55

[[asserts]]
arguments = [75, [5, 5, 5, 5], 56]
