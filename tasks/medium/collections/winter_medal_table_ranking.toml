level             = "medium"
name              = "winter_medal_table_ranking"
tags              = ["collections", "winter_olympics"]
time_to_solve_sec = 420

description_en = """
You are given parallel arrays:
- `countries`
- `gold`
- `silver`
- `bronze`

Rank countries by Winter Olympic table rules:
1. more gold
2. then more silver
3. then more bronze
4. then country name alphabetically

Return ranked country names.
If lengths differ, use common prefix length.
"""

description_ru = """
Даны параллельные массивы:
- `countries`
- `gold`
- `silver`
- `bronze`

Отсортируйте страны по правилам зимнего олимпийского зачета:
1. больше золотых
2. затем больше серебряных
3. затем больше бронзовых
4. затем название страны по алфавиту

Верните отсортированные названия стран.
Если длины массивов различаются, используйте общую префиксную длину.
"""

solution = """
def solution(countries: list[str], gold: list[int], silver: list[int], bronze: list[int]) -> list[str]:
    n = min(len(countries), len(gold), len(silver), len(bronze))
    rows = []
    for i in range(n):
        rows.append((gold[i], silver[i], bronze[i], countries[i]))
    if not rows:
        return []
    rows.sort(key=lambda x: (-x[0], -x[1], -x[2], x[3]))
    out = []
    for _, _, _, c in rows:
        out.append(c)
    return out
"""

examples = """
solution([], [], [], []) == []
solution(["A", "B"], [1, 2], [0, 0], [0, 0]) == ["B", "A"]
solution(["NOR", "SWE", "FIN"], [2, 2, 1], [1, 3, 4], [0, 1, 5]) == ["SWE", "NOR", "FIN"]
"""

