level             = "medium"
name              = "curling_match_score"
tags              = ["math", "winter_olympics"]
time_to_solve_sec = 420

description_en = """
You are given per-end stone distances to the button for two curling teams:
- `a_ends[i]` for team A in end `i`
- `b_ends[i]` for team B in end `i`

Smaller distance is better.
Only one team can score in an end:
- if one side has no stones, the other side scores all its stones in that end
- otherwise, the side with the single best stone scores points equal to the number of its stones that are closer than opponent's best stone
- if best stones are equal, nobody scores

Return total match score as `[a_total, b_total]`.
If the number of ends differs, use only common prefix ends.
"""

description_ru = """
Даны расстояния камней до кнопки по эндам для двух команд по кёрлингу:
- `a_ends[i]` для команды A в энде `i`
- `b_ends[i]` для команды B в энде `i`

Меньшее расстояние лучше.
В одном энде очки получает только одна команда:
- если у одной стороны нет камней, другая получает очки за все свои камни в этом энде
- иначе очки получает сторона с лучшим (самым близким) камнем, и число очков равно количеству ее камней, которые ближе, чем лучший камень соперника
- если лучшие камни равны, очки никто не получает

Верните итог матча как `[a_total, b_total]`.
Если число эндов различается, используйте только общую префиксную часть.
"""

solution = """
def solution(a_ends: list[list[int]], b_ends: list[list[int]]) -> list[int]:
    a = b = 0
    for x, y in zip(a_ends, b_ends):
        if not x or not y: a += len(x) if x else 0; b += len(y) if y else 0
        else: ax, by = min(x), min(y); a += sum(v < by for v in x) if ax < by else 0; b += sum(v < ax for v in y) if by < ax else 0
    return [a, b]
"""

examples = """
solution([], []) == [0, 0]
solution([[12]], [[15]]) == [1, 0]
solution([[9, 12, 15]], [[11, 13]]) == [1, 0]
"""

