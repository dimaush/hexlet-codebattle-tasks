level             = "medium"
name              = "lunar_base_power_grid"
tags              = ["space", "trees", "graphs"]
time_to_solve_sec = 360

description_en = """
After landing, the crew deploys a small lunar base. Module `0` is the main hub, `parent[i]` is the module that powers module `i`, and `demand[i]` is its power usage. Cable `i` must carry the total demand of module `i` and all of its descendants, and its limit is `capacity[i]`. Return the indices of overloaded modules in ascending order.
"""

description_ru = """
После посадки экипаж разворачивает небольшую лунную базу. Модуль `0` — главный хаб, `parent[i]` задает модуль, который питает модуль `i`, а `demand[i]` — его энергопотребление. Кабель `i` должен выдерживать суммарное потребление модуля `i` и всех его потомков, а его лимит равен `capacity[i]`. Верните индексы перегруженных модулей в порядке возрастания.
"""

limits = """
- $1 \\leq n \\leq 200$
- $\\text{len}(\\text{parent}) = \\text{len}(\\text{demand}) = \\text{len}(\\text{capacity}) = n$
- $\\text{parent}[0] = -1$
"""

solution = """
def solution(parent: list[int], demand: list[int], capacity: list[int]) -> list[int]:
    children = [[] for _ in parent]
    for i in range(1, len(parent)): children[parent[i]].append(i)
    out = []
    def dfs(v: int) -> int:
        total = demand[v] + sum(dfs(u) for u in children[v])
        if v and total > capacity[v]: out.append(v)
        return total
    dfs(0)
    return sorted(out)
"""

examples = """
solution([-1], [5], [0]) == []
solution([-1, 0], [5, 3], [0, 2]) == [1]
solution([-1, 0, 1], [1, 2, 3], [0, 4, 5]) == [1]
"""

