level             = "medium"
name              = "speed_skating_heat_qualifiers"
tags              = ["algo", "winter_olympics"]
time_to_solve_sec = 520

description_en = """
You are given `heats`, where each row contains times for one speed skating heat.
Smaller time is better.

Qualification rules:
1. In each heat, top `k` athletes qualify directly.
2. From all remaining athletes, take next `m` fastest overall.
3. Tie-break: smaller heat index, then smaller athlete index.

Return all qualifiers as pairs `[heat_index, athlete_index]`, sorted ascending.
"""

description_ru = """
Дан массив `heats`, где каждая строка содержит времена одного забега в коньках.
Меньшее время лучше.

Правила отбора:
1. В каждом забеге `k` лучших проходят напрямую.
2. Из остальных добираются еще `m` лучших по времени.
3. При равенстве: меньший индекс забега, затем меньший индекс спортсмена.

Верните всех квалифицировавшихся как пары `[heat_index, athlete_index]`, отсортированные по возрастанию.
"""

solution = """
def solution(heats: list[list[int]], k: int, m: int) -> list[list[int]]:
    q, rest = [], []
    for hi, heat in enumerate(heats):
        order = sorted(range(len(heat)), key=lambda ai: (heat[ai], ai))
        for ai in order[:k]:
            q.append([hi, ai])
        for ai in order[k:]:
            rest.append((heat[ai], hi, ai))
    rest.sort(key=lambda x: (x[0], x[1], x[2]))
    for _, hi, ai in rest[:m]:
        q.append([hi, ai])
    q.sort()
    return q
"""

examples = """
solution([], 2, 1) == []
solution([[10, 11, 12]], 1, 1) == [[0, 0], [0, 1]]
solution([[10, 9, 11], [8, 12, 7]], 1, 2) == [[0, 0], [0, 1], [1, 0], [1, 2]]
"""

