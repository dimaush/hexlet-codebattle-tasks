level             = "medium"
name              = "skiathlon_points_table"
tags              = ["algo", "winter_olympics"]
time_to_solve_sec = 480

description_en = """
There are `athletes_count` athletes with ids from `0` to `athletes_count - 1`.

`events` is a list of race results.
Each race is an array of athlete ids in finish order.

`points` defines scoring by place:
- place `0` gets `points[0]`
- place `1` gets `points[1]`

Rules:
- if place has no matching points value, no points are added
- ignore invalid athlete ids
- in one race, repeated id is counted once (first occurrence)

Return total points for each athlete id.
"""

description_ru = """
Есть `athletes_count` спортсменов с id от `0` до `athletes_count - 1`.

`events` — список результатов гонок.
Каждая гонка — массив id в порядке финиша.

`points` задает очки за места:
- место `0` получает `points[0]`
- место `1` получает `points[1]`

Правила:
- если для места нет значения в `points`, очки не начисляются
- некорректные id игнорируются
- в одной гонке повторный id учитывается один раз (первое вхождение)

Верните суммарные очки для каждого id.
"""

solution = """
def solution(athletes_count: int, events: list[list[int]], points: list[int]) -> list[int]:
    total = [0] * athletes_count
    for event in events:
        seen = set()
        for place, aid in enumerate(event):
            if place >= len(points):
                break
            if aid < 0 or aid >= athletes_count or aid in seen:
                continue
            total[aid] += points[place]
            seen.add(aid)
    return total
"""

examples = """
solution(0, [[0, 1]], [5, 3]) == []
solution(3, [[0, 1, 2]], [5, 3, 1]) == [5, 3, 1]
solution(4, [[0, 1, 2], [2, 0, 3]], [4, 2, 1]) == [6, 2, 5, 1]
"""

