level             = "elementary"
name              = "launch_window_day"
tags              = ["space", "math"]
time_to_solve_sec = 140

description_en = """
Mission control opens a launch window every `period` days starting from `first_window`. Given a day number, determine whether Selene may launch on that day.
"""

description_ru = """
Центр управления открывает стартовое окно каждые `period` дней, начиная с `first_window`. По номеру дня определите, может ли Selene стартовать в этот день.
"""

limits = """
- $0 \\leq \\text{first\\_window} \\leq \\text{day} \\leq 10^9$
- $1 \\leq \\text{period} \\leq 10^6$
"""

solution = """
def solution(day: int, first_window: int, period: int) -> bool:
    return day >= first_window and (day - first_window) % period == 0
"""

examples = """
solution(0, 0, 3) == True
solution(1, 0, 3) == False
solution(10, 1, 3) == True
"""

[[input_signature]]
argument_name = "day"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "first_window"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "period"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "boolean"

[[asserts]]
arguments = [0, 0, 3]
expected  = true

[[asserts]]
arguments = [1, 0, 3]
expected  = false

[[asserts]]
arguments = [3, 0, 3]
expected  = true

[[asserts]]
arguments = [10, 1, 3]
expected  = true

[[asserts]]
arguments = [11, 1, 3]
expected  = false

[[asserts]]
arguments = [5, 5, 10]
expected  = true

[[asserts]]
arguments = [14, 5, 3]
expected  = true

[[asserts]]
arguments = [15, 5, 3]
expected  = false

[[asserts]]
arguments = [100, 4, 12]
