level             = "elementary"
name              = "speed_skating_time_to_seconds"
tags              = ["math", "winter_olympics"]
time_to_solve_sec = 160

description_en = """
Given speed skating result as `minutes` and `seconds`, return total seconds.
If time is non-zero, add a fixed `2`-second reaction delay.
"""

description_ru = """
Дан результат в конькобежном спорте как `minutes` и `seconds`.
Верните общее число секунд.
Если время не нулевое, добавьте фиксированную задержку реакции `2` секунды.
"""

solution = """
def solution(minutes: int, seconds: int) -> int:
    t = minutes * 60 + seconds
    return 0 if t == 0 else t + 2
"""

examples = """
solution(0, 0) == 0
solution(1, 5) == 67
solution(2, 40) == 162
"""

