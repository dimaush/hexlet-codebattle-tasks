level             = "elementary"
name              = "ski_laps_count"
tags              = ["math", "winter_olympics"]
time_to_solve_sec = 150

description_en = """
A skier covered `distance_m` meters on a loop with length `lap_m`.
For every `5` full laps, one bonus lap is added to the score.
Return total lap score.
"""

description_ru = """
Лыжник прошел `distance_m` метров по кругу длиной `lap_m`.
За каждые `5` полных кругов добавляется один бонусный круг в зачет.
Верните итоговый зачет кругов.
"""

solution = """
def solution(distance_m: int, lap_m: int) -> int:
    x = distance_m // lap_m
    return x + x // 5
"""

examples = """
solution(0, 5) == 0
solution(15, 5) == 3
solution(250, 25) == 12
"""

