level             = "elementary"
name              = "figure_skating_total_points"
tags              = ["math", "winter_olympics"]
time_to_solve_sec = 170

description_en = """
Given judges' `points` for a figure skating routine, drop one lowest score and return the total.
If there are no scores, return `0.0`.
"""

description_ru = """
Дан массив оценок судей `points` за выступление в фигурном катании.
Уберите одну минимальную оценку и верните сумму остальных.
Если оценок нет, верните `0.0`.
"""

solution = """
def solution(points: list[float]) -> float:
    return 0.0 if not points else float(sum(points) - min(points))
"""

examples = """
solution([]) == 0.0
solution([8.5]) == 0.0
solution([9.0, 8.5, 9.5]) == 18.5
"""

[[input_signature]]
argument_name = "points"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "float"

[output_signature.type]
name = "float"

